<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Arrow flag shape - main body -->
  <path d="M 8 12 L 200 12 L 228 40 L 200 68 L 8 68 Z" 
        fill="#FFEB3B" filter="url(#shadow)"/>
  
  <!-- Darker border/outline -->
  <path d="M 8 12 L 200 12 L 228 40 L 200 68 L 8 68 Z" 
        fill="none" stroke="#F9A825" stroke-width="3"/>
  
  <!-- Text: SIGN HERE (moved right for more left padding) -->
  <text x="70" y="43" font-family="Arial, sans-serif" font-size="28" 
        font-weight="bold" fill="#212121" text-anchor="middle" 
        dominant-baseline="middle">SIGN HERE</text>
  
  <!-- Pen icon positioned halfway between text end and arrow -->
  <g transform="translate(155, 40)">
    <!-- Pen tip/nib -->
    <path d="M -4 -12 L 4 -12 L 5 -4 L -5 -4 Z" fill="#1565C0"/>
    <!-- Pen body/barrel -->
    <rect x="-3" y="-20" width="6" height="8" fill="#1976D2" rx="1"/>
    <!-- Pen cap/end -->
    <rect x="-2.5" y="-24" width="5" height="4" fill="#1976D2" rx="1"/>
    <!-- Signature swoosh -->
    <path d="M -12 4 Q -6 0 0 4 Q 6 8 14 4" stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
